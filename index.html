<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="conteudo">

    <div class="conteudo-titulo">
        <h1 class="titulo-principal">Gerador de Senhas 🔐</h1>
        <p class="titulo-secundario">Crie senhas seguras de forma rápida</p>
    </div>

    <div class="conteudo-senha">
        <input type="text" id="campo-senha" readonly>
        <button id="copiar">Copiar</button>
    </div>

    <div class="parametro">

        <h2 class="parametro-titulo">Personalização</h2>

        <div class="parametro-coluna__senha">

            <div class="parametro-senha">
                <h3 class="parametro-senha__titulo">Tamanho</h3>
                <input type="range" id="tamanho" min="6" max="30" value="12">
                <span id="valor-tamanho">12</span>
            </div>

            <div class="parametro-senha">
                <h3 class="parametro-senha__titulo">Opções</h3>

                <label><input type="checkbox" id="letras" checked> Letras</label><br>
                <label><input type="checkbox" id="numeros" checked> Números</label><br>
                <label><input type="checkbox" id="simbolos"> Símbolos</label>
            </div>

            <div class="parametro-senha">
                <h3 class="parametro-senha__titulo">Ação</h3>
                <button id="gerar">Gerar senha</button>
                <p>Força: <span id="forca">-</span></p>
            </div>

        </div>
    </div>

</section>

<script>
const campoSenha = document.getElementById("campo-senha");
const botaoGerar = document.getElementById("gerar");
const botaoCopiar = document.getElementById("copiar");

const tamanho = document.getElementById("tamanho");
const valorTamanho = document.getElementById("valor-tamanho");

const chkLetras = document.getElementById("letras");
const chkNumeros = document.getElementById("numeros");
const chkSimbolos = document.getElementById("simbolos");

const forca = document.getElementById("forca");

tamanho.addEventListener("input", () => {
    valorTamanho.textContent = tamanho.value;
});

function gerarSenha() {
    const letras = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numeros = "0123456789";
    const simbolos = "!@#$%&*()-_=+[]{}<>?";

    let chars = "";

    if (chkLetras.checked) chars += letras;
    if (chkNumeros.checked) chars += numeros;
    if (chkSimbolos.checked) chars += simbolos;

    if (chars === "") return "";

    let senha = "";

    for (let i = 0; i < tamanho.value; i++) {
        senha += chars[Math.floor(Math.random() * chars.length)];
    }

    return senha;
}

function avaliarForca(senha) {
    if (senha.length < 8) return "Fraca";
    if (senha.length < 12) return "Média";
    return "Forte";
}

botaoGerar.addEventListener("click", () => {
    const senha = gerarSenha();
    campoSenha.value = senha;
    forca.textContent = avaliarForca(senha);
});

botaoCopiar.addEventListener("click", () => {
    campoSenha.select();
    document.execCommand("copy");
    alert("Senha copiada!");
});
</script>

</body>
</html>
